<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Aplikacji</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --accent-hover: #3182ce;
            --card-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
        }

        main {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .hero-container {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 60px 40px;
            max-width: 600px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.2);
        }

        h1 {
            color: #ffffff;
            font-size: 2.5rem;
            margin-top: 0;
            margin-bottom: 20px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 40px;
            color: #8b949e;
        }

        .btn-gcp {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-color);
            color: #ffffff;
            font-weight: 600;
            text-decoration: none;
            padding: 14px 28px;
            border-radius: 6px;
            transition: background-color 0.2s ease, transform 0.1s ease;
            font-size: 1.1rem;
        }

        .btn-gcp:hover {
            background-color: var(--accent-hover);
            transform: translateY(-2px);
        }

        .btn-gcp svg {
            margin-right: 10px;
            fill: currentColor;
        }

        footer {
            text-align: center;
            padding: 20px;
            border-top: 1px solid var(--border-color);
            font-size: 0.9rem;
            color: #8b949e;
        }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo">AppDashboard</a>
        <div class="nav-links">
            <span style="color: #8b949e;">Status: <strong style="color: #3fb950;">Online</strong></span>
        </div>
    </header>

    <main>
        <div class="hero-container">
            <h1>Zarządzanie Infrastrukturą</h1>
            <p>Witaj w panelu głównym swojej aplikacji. Aby zarządzać zasobami, bazami danych oraz monitorować logi serwera, przejdź do konsoli chmurowej.</p>
            
            <a href="https://console.cloud.google.com/" class="btn-gcp" target="_blank" rel="noopener noreferrer">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/>
                </svg>
                Otwórz Google Cloud Console
            </a>
        </div>
    </main>

    <footer>
        &copy; 2026 Twoja Aplikacja. Wszelkie prawa zastrzeżone.
    </footer>

</body>
</html>
